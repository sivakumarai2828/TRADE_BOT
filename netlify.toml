[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  VITE_API_URL = ""

# API proxy via edge function (see netlify/edge-functions/api-proxy.js)
# All /status, /start, /stop, /daybot/* etc. are handled by the edge function.

# SPA fallback — let React Router handle client-side navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
